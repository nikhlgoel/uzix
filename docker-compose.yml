services:
  uzix:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      UZIX_API_HOST: 0.0.0.0
      UZIX_API_PORT: 5000
      UZIX_WARMUP_MODEL: "true"
      UZIX_LOG_LEVEL: INFO
      UZIX_JSON_LOGS: "true"
      UZIX_RATE_LIMIT_ENABLED: "true"
      UZIX_RATE_LIMIT_REQUESTS: 60
      UZIX_RATE_LIMIT_WINDOW_SECONDS: 60
